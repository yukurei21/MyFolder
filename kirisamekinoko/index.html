<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>霧雨魔法キノコ園 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#1a1208;
  --panel-bg:#221810;
  --border:#6b4226;
  --border-light:#a0623a;
  --cream:#f5e6c8;
  --gold:#d4a017;
  --green:#4a7c2f;
  --green-light:#7ab648;
  --brown:#3d2b1f;
  --brown-mid:#5c3d2e;
  --red:#c0392b;
  --blue:#2980b9;
  --shadow:rgba(0,0,0,0.7);
}
body{
  background:var(--bg);
  font-family:'Courier New',monospace;
  color:var(--cream);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  user-select:none;
}

/* ===== HEADER ===== */
#header{
  background:linear-gradient(180deg,#0d0800,var(--panel-bg));
  border-bottom:2px solid var(--border);
  padding:5px 8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
  position:relative;
  z-index:20;
}
#header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:shimmer 2.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.hdr-stat{display:flex;flex-direction:column;align-items:center;min-width:60px;}
.hdr-label{font-size:8px;color:#8a7060;text-transform:uppercase;}
.hdr-value{font-size:14px;font-weight:bold;color:var(--gold);}
.hdr-value.green{color:var(--green-light);}
.hdr-value.blue{color:#64b3e8;}
#title-badge{font-size:11px;font-weight:bold;color:var(--gold);text-shadow:0 0 6px rgba(212,160,23,.6);}

/* ===== ISO VIEWPORT ===== */
#iso-viewport{
  flex:1;
  overflow:hidden;
  position:relative;
  background:
    radial-gradient(ellipse at 40% 30%,rgba(74,124,47,.1) 0%,transparent 60%),
    var(--bg);
  cursor:default;
}
#iso-scroll{
  position:absolute;
  inset:0;
  overflow:hidden;
  touch-action:none;
}
#iso-stage{
  position:absolute;
  top:50%;left:50%;
  transform-origin:50% 50%;
}

/* ===== ISO TILE ===== */
.iso-tile{
  position:absolute;
  transform-origin:50% 100%;
  transition:filter .15s;
  cursor:pointer;
}
.iso-tile:hover .tile-top{filter:brightness(1.3);}
.tile-top,.tile-left,.tile-right{position:absolute;pointer-events:none;}
.tile-top{
  width:var(--tw);height:var(--th);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
}
.tile-left{
  width:calc(var(--tw)/2);
  height:var(--th);
  clip-path:polygon(0% 0%,100% 0%,100% 100%,0% 100%);
  top:calc(var(--th)/2);
  left:0;
}
.tile-right{
  width:calc(var(--tw)/2);
  height:var(--th);
  clip-path:polygon(0% 0%,100% 0%,100% 100%,0% 100%);
  top:calc(var(--th)/2);
  left:calc(var(--tw)/2);
}

/* ===== BUILDING SPRITES ===== */
.bld-sprite{
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  pointer-events:none;
  transform:translateX(-50%);
}
.bld-body{
  background:linear-gradient(180deg,#4a3828,#2d1f10);
  border:1px solid var(--border-light);
  border-radius:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  position:relative;
}
.bld-roof{
  width:0;height:0;
  border-left:solid transparent;
  border-right:solid transparent;
  border-bottom:solid #6b4226;
}
.bld-label{
  font-size:7px;color:var(--cream);
  background:rgba(0,0,0,.6);
  padding:1px 3px;border-radius:2px;
  white-space:nowrap;margin-top:1px;
}
.bld-progress{
  width:30px;height:3px;
  background:rgba(0,0,0,.5);
  border-radius:2px;overflow:hidden;
  margin-top:1px;
}
.bld-progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--green),var(--green-light));
  transition:width .3s;
}
.bld-combo{
  position:absolute;
  top:-10px;right:-8px;
  background:var(--gold);color:var(--brown);
  font-size:7px;font-weight:bold;
  padding:1px 3px;border-radius:3px;
  white-space:nowrap;
  animation:combo-pop .3s ease-out;
}
@keyframes combo-pop{
  0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}
}

/* ===== CHARACTER ===== */
.character{
  position:absolute;
  display:flex;flex-direction:column;
  align-items:center;
  pointer-events:none;
  transition:left .4s linear,top .4s linear;
  z-index:5;
}
.char-body{
  width:16px;height:20px;
  border-radius:3px 3px 0 0;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
}
.char-hat{font-size:14px;line-height:1;}
.char-carry{
  position:absolute;
  top:-10px;right:-6px;
  font-size:11px;
  animation:carry-bob .5s ease-in-out infinite alternate;
}
@keyframes carry-bob{0%{transform:translateY(0)}100%{transform:translateY(-2px)}}
.char-shadow{
  width:12px;height:4px;
  background:rgba(0,0,0,.4);
  border-radius:50%;
  margin-top:1px;
}
.char-status{
  font-size:7px;
  background:rgba(0,0,0,.7);
  padding:1px 3px;border-radius:2px;
  white-space:nowrap;
  margin-top:1px;
}

/* ===== PARTICLES ===== */
.particle{
  position:fixed;pointer-events:none;z-index:100;
  font-size:11px;font-weight:bold;
  animation:float-up .9s ease-out forwards;
}
@keyframes float-up{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-45px) scale(.7)}
}

/* ===== OVERLAY EVENTS ===== */
#event-overlay{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:30;opacity:0;
  transition:opacity .5s;
}
#event-overlay.fog{
  opacity:1;
  background:radial-gradient(ellipse at center,rgba(180,210,255,.35) 0%,rgba(150,180,230,.15) 100%);
  animation:fog-drift 4s ease-in-out infinite;
}
@keyframes fog-drift{0%,100%{opacity:.6}50%{opacity:1}}

/* ===== EVENT BANNER ===== */
#event-banner{
  position:fixed;top:56px;left:50%;
  transform:translateX(-50%);
  background:linear-gradient(90deg,#0d0800,#2d1f10,#0d0800);
  border:2px solid var(--gold);
  border-radius:10px;
  padding:7px 14px;
  font-size:12px;font-weight:bold;
  color:var(--gold);
  text-shadow:0 0 8px rgba(212,160,23,.8);
  z-index:40;
  opacity:0;pointer-events:none;
  max-width:88vw;text-align:center;
  white-space:normal;
}
#event-banner.show{animation:banner-anim 3s ease forwards;}
@keyframes banner-anim{
  0%{opacity:0;transform:translateX(-50%) translateY(-8px)}
  12%{opacity:1;transform:translateX(-50%) translateY(0)}
  80%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(-8px)}
}

/* ===== LEFT MENU ===== */
#left-menu{
  position:fixed;left:0;top:50%;
  transform:translateY(-50%);
  z-index:20;
  display:flex;
  flex-direction:column;
  gap:3px;
  padding:4px;
}
.menu-icon-btn{
  width:44px;height:44px;
  background:linear-gradient(180deg,var(--brown-mid),var(--brown));
  border:2px solid var(--border);
  border-radius:8px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:18px;
  cursor:pointer;
  transition:all .15s;
  position:relative;
}
.menu-icon-btn.active{
  border-color:var(--gold);
  background:linear-gradient(180deg,#4a3820,#2d2010);
  box-shadow:0 0 8px rgba(212,160,23,.4);
}
.menu-icon-btn:active{transform:scale(.9);}
.menu-icon-btn .btn-sub{font-size:7px;color:#8a7060;margin-top:1px;}

/* ===== SLIDE PANEL ===== */
#slide-panel{
  position:fixed;left:52px;top:0;bottom:0;
  width:0;overflow:hidden;
  background:linear-gradient(90deg,var(--panel-bg),rgba(34,24,16,.97));
  border-right:2px solid var(--border);
  z-index:19;
  transition:width .25s ease;
  display:flex;flex-direction:column;
}
#slide-panel.open{width:160px;}
#slide-panel-inner{
  padding:8px 6px;
  overflow-y:auto;
  flex:1;
  min-width:160px;
}
.panel-section-title{
  font-size:9px;color:var(--gold);
  text-transform:uppercase;
  letter-spacing:1px;
  margin:8px 0 4px;
  padding-bottom:2px;
  border-bottom:1px solid var(--border);
}
.panel-item{
  padding:7px 6px;
  border-radius:6px;
  cursor:pointer;
  transition:background .15s;
  display:flex;align-items:center;gap:6px;
  margin-bottom:2px;
}
.panel-item:hover{background:rgba(255,255,255,.07);}
.panel-item.selected{
  background:rgba(74,124,47,.25);
  border:1px solid var(--green);
}
.panel-item .item-icon{font-size:18px;flex-shrink:0;}
.panel-item .item-info{flex:1;overflow:hidden;}
.panel-item .item-name{font-size:10px;font-weight:bold;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.panel-item .item-cost{font-size:9px;color:var(--gold);}
.panel-item.locked{opacity:.4;}

/* ===== DETAIL PANEL ===== */
#detail-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,rgba(13,8,0,.95),#0d0800);
  border-top:2px solid var(--border);
  padding:10px 12px 14px;
  z-index:18;
  transform:translateY(100%);
  transition:transform .25s ease;
  max-height:45vh;
  overflow-y:auto;
}
#detail-panel.open{transform:translateY(0);}
.dp-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.dp-icon{font-size:32px;flex-shrink:0;}
.dp-info{flex:1;}
.dp-name{font-size:15px;font-weight:bold;color:var(--gold);margin-bottom:2px;}
.dp-cost{font-size:11px;color:var(--green-light);margin-bottom:4px;}
.dp-flavor{font-size:10px;color:#c4a882;font-style:italic;line-height:1.4;margin-bottom:6px;padding:6px 8px;background:rgba(255,255,255,.04);border-left:2px solid var(--border-light);border-radius:0 4px 4px 0;}
.dp-effects{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.dp-tag{font-size:9px;padding:2px 6px;border-radius:10px;background:rgba(74,124,47,.3);border:1px solid var(--green);color:var(--green-light);}
.dp-tag.combo{background:rgba(212,160,23,.2);border-color:var(--gold);color:var(--gold);}
#dp-build-btn{
  width:100%;padding:10px;
  background:linear-gradient(180deg,var(--green),#2d4a1e);
  border:2px solid var(--green-light);
  border-radius:8px;
  color:var(--cream);font-size:13px;font-weight:bold;
  cursor:pointer;
  transition:all .15s;
}
#dp-build-btn:active{transform:scale(.97);}
#dp-build-btn:disabled{opacity:.4;cursor:not-allowed;}
#dp-cancel-btn{
  width:100%;padding:7px;margin-top:5px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:6px;
  color:#8a7060;font-size:11px;
  cursor:pointer;
}

/* ===== RESEARCH PANEL CONTENT ===== */
.research-card{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:6px;
  padding:7px 8px;
  margin-bottom:6px;
}
.rc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.rc-name{font-size:11px;font-weight:bold;}
.rc-status{font-size:9px;color:var(--gold);}
.rc-desc{font-size:9px;color:#8a7060;margin-bottom:5px;}
.rc-bar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.rc-bar-fill{height:100%;background:linear-gradient(90deg,#2980b9,#64b3e8);transition:width .4s;}
.rc-btn{
  width:100%;padding:5px;
  background:rgba(41,128,185,.2);
  border:1px solid #2980b9;
  border-radius:4px;
  color:#64b3e8;font-size:10px;
  cursor:pointer;
}
.rc-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ===== STAFF PANEL ===== */
.staff-card{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:6px;
  padding:7px;
  margin-bottom:5px;
  display:flex;align-items:center;gap:8px;
}
.sc-avatar{font-size:22px;}
.sc-info{flex:1;}
.sc-name{font-size:11px;font-weight:bold;}
.sc-role{font-size:9px;color:#8a7060;}
.sc-stats{display:flex;gap:6px;margin-top:2px;}
.sc-stat{font-size:8px;background:rgba(255,255,255,.06);padding:1px 4px;border-radius:3px;}
.hire-btn{
  padding:4px 7px;
  background:rgba(74,124,47,.3);
  border:1px solid var(--green);
  border-radius:4px;
  color:var(--green-light);font-size:10px;
  cursor:pointer;
}
.hire-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ===== BOTTOM TOOLBAR ===== */
#bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.8));
  padding:4px 8px 8px;
  display:flex;justify-content:flex-end;gap:6px;
  z-index:17;
  pointer-events:none;
}
#bottom-bar.hidden{display:none;}
.tool-btn{
  pointer-events:auto;
  width:44px;height:44px;
  background:linear-gradient(180deg,var(--brown-mid),var(--brown));
  border:2px solid var(--border);
  border-radius:50%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:18px;
  cursor:pointer;
  transition:all .15s;
}
.tool-btn.active{border-color:var(--gold);box-shadow:0 0 8px rgba(212,160,23,.5);}
.tool-btn:active{transform:scale(.88);}

/* ===== MODAL ===== */
#modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  z-index:50;
  display:none;align-items:center;justify-content:center;
  padding:16px;
}
#modal-overlay.open{display:flex;}
#modal-box{
  background:linear-gradient(180deg,#1a1006,var(--panel-bg));
  border:2px solid var(--border-light);
  border-radius:14px;
  padding:14px;
  width:100%;max-width:340px;
  max-height:75vh;overflow-y:auto;
}
.modal-title{font-size:15px;font-weight:bold;color:var(--gold);margin-bottom:10px;text-align:center;}
.modal-close{
  width:100%;margin-top:8px;padding:9px;
  background:var(--brown-mid);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--cream);font-size:13px;
  cursor:pointer;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--panel-bg);}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px;}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="hdr-stat">
    <span class="hdr-label">資金</span>
    <span class="hdr-value" id="hdr-money">¥1,000</span>
  </div>
  <div id="title-badge">🍄 霧雨魔法キノコ園</div>
  <div class="hdr-stat">
    <span class="hdr-label">日付</span>
    <span class="hdr-value blue" id="hdr-date">1年1日</span>
  </div>
</div>

<!-- ISO VIEWPORT -->
<div id="iso-viewport">
  <div id="iso-scroll">
    <div id="iso-stage"></div>
  </div>
</div>

<!-- EVENT OVERLAY -->
<div id="event-overlay"></div>
<div id="event-banner"></div>

<!-- LEFT MENU -->
<div id="left-menu">
  <div class="menu-icon-btn" data-tab="build" onclick="toggleTab('build')">
    🏗️<span class="btn-sub">建設</span>
  </div>
  <div class="menu-icon-btn" data-tab="research" onclick="toggleTab('research')">
    🔬<span class="btn-sub">研究</span>
  </div>
  <div class="menu-icon-btn" data-tab="staff" onclick="toggleTab('staff')">
    👤<span class="btn-sub">人員</span>
  </div>
  <div class="menu-icon-btn" data-tab="log" onclick="toggleTab('log')">
    📋<span class="btn-sub">ログ</span>
  </div>
</div>

<!-- SLIDE PANEL -->
<div id="slide-panel">
  <div id="slide-panel-inner"></div>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel">
  <div id="detail-content"></div>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <div class="tool-btn" id="tool-remove" title="撤去" onclick="toggleTool('remove')">🗑️</div>
  <div class="tool-btn" id="tool-move" title="移動" onclick="toggleTool('move')">✋</div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div class="modal-title" id="modal-title">情報</div>
    <div id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">✕ 閉じる</button>
  </div>
</div>

<script>

const TW = 64, TH = 32, TD = 20; // tile width, height, depth
const COLS = 10, ROWS = 10;

    color:'#4a3820', w:1, h:1,

  },
  // --- FACILITY ---
  collection_box:{
    id:'collection_box', category:'facility',

    flavor:'ここにキノコを放り込めば、私が責任を持って換金してくるぜ。……少し手数料をもらうがな！',

    combos:['path','shelf_nameko'],
    color:'#5a3010', w:1, h:1,
    maxHP:100, buildTime:1, isDropoff:true

// ====================================================
//  ISO MATH
// ====================================================
function isoPos(col, row) {
  const x = (col - row) * (TW / 2);
  const y = (col + row) * (TH / 2);
  return { x, y };
}
function screenToIso(sx, sy) {
  // inverse iso
  const col = (sx / (TW/2) + sy / (TH/2)) / 2;
  const row = (sy / (TH/2) - sx / (TW/2)) / 2;
  return { col: Math.floor(col), row: Math.floor(row) };
}

// Stage offset so grid is centered
let stageOffX = 0, stageOffY = 0;
function initStage() {
  const vp = document.getElementById('iso-viewport');
  const vpW = vp.clientWidth, vpH = vp.clientHeight;
  const stage = document.getElementById('iso-stage');
  // Center the grid
  stageOffX = vpW / 2;
  stageOffY = vpH * 0.18;
  stage.style.transform = `translate(${stageOffX}px, ${stageOffY}px)`;
}

// ====================================================
//  TILE GRID
// ====================================================
const tileEls = [];
function buildGrid() {
  const stage = document.getElementById('iso-stage');
  stage.innerHTML = '';
  // Render in diagonal order for proper z-layering
  for (let sum = 0; sum < COLS + ROWS - 1; sum++) {
    for (let col = 0; col < COLS; col++) {
      const row = sum - col;
      if (row < 0 || row >= ROWS) continue;
      createTile(col, row, stage);
    }
  }
}

function createTile(col, row, stage) {
  const { x, y } = isoPos(col, row);
  const el = document.createElement('div');
  el.className = 'iso-tile';
  el.dataset.col = col;
  el.dataset.row = row;
  el.style.cssText = `
    --tw:${TW}px;--th:${TH}px;
    left:${x - TW/2}px;
    top:${y - TH/2}px;
    width:${TW}px;
    height:${TH + TD}px;
    z-index:${col + row};
  `;
  // Top face
  const top = document.createElement('div');
  top.className = 'tile-top';
  top.style.cssText = `width:${TW}px;height:${TH}px;background:#2a1e10;`;
  // Left face
  const left = document.createElement('div');
  left.className = 'tile-left';
  left.style.cssText = `width:${TW/2}px;height:${TD}px;background:#1a1008;top:${TH/2}px;left:0;clip-path:none;`;
  // Right face
  const right = document.createElement('div');
  right.className = 'tile-right';
  right.style.cssText = `width:${TW/2}px;height:${TD}px;background:#150d06;top:${TH/2}px;left:${TW/2}px;clip-path:none;`;

  el.appendChild(top);
  el.appendChild(left);
  el.appendChild(right);

  el.addEventListener('pointerdown', () => onTileTap(col, row));
  el.addEventListener('touchstart', (e)=>e.preventDefault(), {passive:false});

  stage.appendChild(el);
  tileEls.push({ el, top, col, row });
}

function getTileEl(col, row) {
  return tileEls.find(t => t.col === col && t.row === row);
}

function highlightTile(col, row, color) {
  const t = getTileEl(col, row);
  if (t) t.top.style.background = color;
}
function resetTileHighlight(col, row) {
  const t = getTileEl(col, row);
  if (t) t.top.style.background = '#2a1e10';
}

// ====================================================
//  BUILDING PLACEMENT
// ====================================================
function getBldAt(col, row) {
  return G.placed.find(p => p.col === col && p.row === row);
}

function onTileTap(col, row) {
  if (G.activeTool === 'remove') {
    removeBldAt(col, row);
    return;
  }
  const existing = getBldAt(col, row);
  if (existing) {
    showPlacedInfo(existing);
    return;
  }
  if (G.selectedBldId) {
    placeBuild(G.selectedBldId, col, row);
  }
}

function placeBuild(bldId, col, row) {
  const bld = BUILDINGS[bldId];
  if (!bld) return;
  if (G.money < bld.cost) { showBanner('💰 資金が足りない！'); return; }
  if (getBldAt(col, row)) { showBanner('⚠️ 既に建物がある！'); return; }
  // Check unlock
  if (bld.unlockResearch && !RESEARCH_TREE.find(r=>r.id===bld.unlockResearch&&r.done)) {
    showBanner('🔬 先に研究を完了させてくれ！'); return;
  }

  G.money -= bld.cost;
  const placed = {
    id: G.nextPlacedId++,
    bldId,
    col, row,
    progress: 0,       // build progress 0-100
    yieldProg: 0,      // harvest progress 0-100
    hp: bld.maxHP,
    active: bld.buildTime === 0,
    hasYield: false,
    el: null,
    labelEl: null,
    progressEl: null,
    comboEl: null,
  };
  G.placed.push(placed);

  // DOM
  renderPlacedBuilding(placed);
  updateCombos();
  updateUI();
  addLog(`🏗️ ${bld.name} を (${col},${row}) に建設開始`);
  showBanner(`🏗️ ${bld.name} を建設中...`);
}

function renderPlacedBuilding(placed) {
  const bld = BUILDINGS[placed.bldId];
  const { x, y } = isoPos(placed.col, placed.row);
  const stage = document.getElementById('iso-stage');

  const sprite = document.createElement('div');
  sprite.className = 'bld-sprite';
  sprite.id = `bld-${placed.id}`;
  sprite.style.cssText = `
    left:${x}px;
    top:${y - TH/2 - 36}px;
    z-index:${(placed.col + placed.row) * 2 + 1};
    width:${TW}px;
  `;

  const body = document.createElement('div');
  body.className = 'bld-body';
  body.style.cssText = `width:${TW-8}px;height:36px;background:linear-gradient(180deg,${bld.color}cc,${bld.color}88);`;
  body.textContent = bld.icon;

  const label = document.createElement('div');
  label.className = 'bld-label';
  label.textContent = bld.name;

  const pbar = document.createElement('div');
  pbar.className = 'bld-progress';
  const pfill = document.createElement('div');
  pfill.className = 'bld-progress-fill';
  pfill.style.width = placed.active ? '100%' : '0%';
  pbar.appendChild(pfill);

  const comboEl = document.createElement('div');
  comboEl.className = 'bld-combo';
  comboEl.style.display = 'none';

  body.appendChild(comboEl);
  sprite.appendChild(body);
  sprite.appendChild(label);
  sprite.appendChild(pbar);

  stage.appendChild(sprite);
  placed.el = sprite;
  placed.labelEl = label;
  placed.progressEl = pfill;
  placed.comboEl = comboEl;

  // Color tile top
  const te = getTileEl(placed.col, placed.row);
  if (te) te.top.style.background = bld.color;
}

function removeBldAt(col, row) {
  const idx = G.placed.findIndex(p => p.col === col && p.row === row);
  if (idx < 0) return;
  const placed = G.placed[idx];
  const bld = BUILDINGS[placed.bldId];
  G.money += Math.floor(bld.cost * 0.5);
  placed.el?.remove();
  G.placed.splice(idx, 1);
  resetTileHighlight(col, row);
  updateCombos();
  updateUI();
  addLog(`🗑️ ${bld.name} を撤去 (50%返金)`);
  showBanner(`🗑️ ${bld.name} を撤去した`);
}

function showPlacedInfo(placed) {
  const bld = BUILDINGS[placed.bldId];
  const combos = G.comboCache[placed.id] || [];
  openModal(
    `${bld.icon} ${bld.name}`,
    `<div style="font-size:10px;color:#8a7060;font-style:italic;padding:6px;background:rgba(255,255,255,.04);border-left:2px solid var(--border-light);margin-bottom:8px">${bld.flavor}</div>
     <div style="font-size:10px;margin-bottom:6px">状態: <strong>${placed.active ? '稼働中' : '建設中'}</strong></div>
     ${bld.yieldTime ? `<div style="font-size:10px;margin-bottom:4px">収穫進捗: ${Math.floor(placed.yieldProg)}%</div>` : ''}
     ${combos.length ? `<div style="margin-bottom:6px">${combos.map(c=>`<span class="dp-tag combo">⚡ ${c}</span>`).join(' ')}</div>` : ''}
     <div>${bld.effects.map(e=>`<div class="dp-tag" style="margin-bottom:3px;display:inline-block">✅ ${e}</div>`).join('')}</div>`
  );
}

// ====================================================
//  COMBO SYSTEM
// ====================================================
function getAdjacentPlaced(col, row) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  return dirs
    .map(([dc,dr]) => getBldAt(col+dc, row+dr))
    .filter(Boolean);
}

function updateCombos() {
  G.comboCache = {};
  G.placed.forEach(placed => {
    const bld = BUILDINGS[placed.bldId];
    if (!bld.combos?.length) return;
    const adj = getAdjacentPlaced(placed.col, placed.row);
    const hits = adj.filter(a => bld.combos.includes(a.bldId));
    if (hits.length) {
      const labels = hits.map(h => {
        const hb = BUILDINGS[h.bldId];
        return `${hb.icon}${hb.name.slice(0,4)}と相性◎`;
      });
      G.comboCache[placed.id] = labels;
      if (placed.comboEl) {
        placed.comboEl.textContent = '⚡' + labels[0].slice(0,6);
        placed.comboEl.style.display = 'block';
      }
    } else {
      if (placed.comboEl) placed.comboEl.style.display = 'none';
    }
  });
}

function isoToScreen(col, row) {
  const { x, y } = isoPos(col, row);
  return { x: stageOffX + x, y: stageOffY + y };
}

function spawnCharEl(s) {
  const sp = STAFF_POOL.find(sp => sp.id === s.staffId);
  const stage = document.getElementById('iso-stage');

    <div class="char-body" style="background:${sp.id==='marisa'?'#2a1a60':sp.id==='reimu'?'#8b0000':sp.id==='alice'?'#003366':'#1a4a60'}">${sp.icon}</div>
    <div class="char-shadow"></div>
    <div class="char-status" id="cs-${s.staffId}">待機中</div>
  `;
  stage.appendChild(el);
  s.el = el;
  s.statusEl = el.querySelector(`#cs-${s.staffId}`);
}

function initCharacters() {
  G.staff.forEach(s => {
    if (!s.el) spawnCharEl(s);
  });
}

function updateCharacters() {
  G.staff.forEach(s => {
    const sp = STAFF_POOL.find(sp => sp.id === s.staffId);
    s.fatigue = Math.min(100, s.fatigue + 0.3);

    // Fatigue → rest
    if (s.fatigue > 80 && s.state !== 'rest') {
      const bench = G.placed.find(p => p.bldId === 'bench' && p.active);
      if (bench) {
        s.state = 'rest';
        s.target = bench;
      }
    }

    // Bench recovery
    const benchNearby = G.placed.find(p => p.bldId === 'bench' && p.active &&
      Math.abs(p.col - Math.round(s.x / TW)) < 2);
    const fatigueRecovery = benchNearby ? 1.5 : 0.5;

    if (s.state === 'rest') {
      s.fatigue = Math.max(0, s.fatigue - fatigueRecovery * 3);
      if (s.fatigue < 20) s.state = 'idle';
    }

    if (s.state === 'idle') {
      // Find a ready yield
      const readyShelf = G.placed.find(p => {
        const b = BUILDINGS[p.bldId];
        return b?.yieldTime && p.hasYield && p.active;
      });
      if (readyShelf) {
        s.state = 'work';
        s.target = readyShelf;
      }
    }

    if (s.state === 'work' && s.target) {
      const tgt = s.target;
      const { x: tx, y: ty } = isoPos(tgt.col, tgt.row);
      const speed = (sp.speed * 1.5) * (G.placed.some(p=>p.bldId==='path'&&p.active) ? 1.15 : 1);
      const dx = tx - s.x, dy = ty - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 5) {
        // Arrived → harvest
        tgt.hasYield = false;
        tgt.yieldProg = 0;
        const bld = BUILDINGS[tgt.bldId];
        let amt = bld.yieldAmt;
        // Combo bonus
        const adj = getAdjacentPlaced(tgt.col, tgt.row);
        adj.forEach(a => {
          if (a.bldId === 'water_channel' && a.active) amt = Math.floor(amt * 1.1);
          if (a.bldId === 'magic_lamp' && a.active && bld.id === 'shelf_hikari') amt = Math.floor(amt * 1.3);
        });
        if (RESEARCH_TREE.find(r=>r.id==='bio1'&&r.done) && bld.id === 'shelf_nameko') amt = Math.floor(amt * 1.2);

        s.carry = { icon: bld.yieldIcon, amt };
        s.state = 'carry';
        // Find dropoff
        s.target = G.placed.find(p => p.bldId === 'collection_box' && p.active) || null;
        if (!s.target) {
          // No dropoff → sell directly
          doSell(s);
          s.state = 'idle';
        }
        updateCarryDisplay(s, sp);
      } else {
        s.x += (dx / dist) * speed;
        s.y += (dy / dist) * speed;
        if (s.el) s.el.style.transition = 'left .1s linear,top .1s linear';
        if (s.el) { s.el.style.left = s.x+'px'; s.el.style.top = s.y+'px'; }
      }
    }

    if (s.state === 'carry' && s.target) {
      const sp2 = STAFF_POOL.find(sp=>sp.id===s.staffId);
      const { x: tx, y: ty } = isoPos(s.target.col, s.target.row);
      const speed = sp2.speed * 1.2;
      const dx = tx - s.x, dy = ty - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 5) {
        doSell(s);
        s.carry = null;
        s.state = 'idle';
        updateCarryDisplay(s, sp2);
      } else {
        s.x += (dx / dist) * speed;
        s.y += (dy / dist) * speed;
        if (s.el) { s.el.style.left = s.x+'px'; s.el.style.top = s.y+'px'; }
      }
    }

    // Status label
    if (s.statusEl) {
      s.statusEl.textContent =
        s.state === 'idle' ? '待機中' :
        s.state === 'work' ? '収穫中🍄' :
        s.state === 'carry' ? '運搬中📦' : '休憩中💤';
    }
    if (s.fatigue > 60 && s.state !== 'rest') {
      if (s.statusEl) s.statusEl.textContent += '😓';
    }
  });
}

function updateCarryDisplay(s, sp) {
  if (!s.el) return;
  let carryEl = s.el.querySelector('.char-carry');
  if (s.carry) {
    if (!carryEl) {
      carryEl = document.createElement('span');
      carryEl.className = 'char-carry';
      s.el.querySelector('.char-body').appendChild(carryEl);
    }
    carryEl.textContent = s.carry.icon;
  } else if (carryEl) {
    carryEl.remove();
  }
}

function doSell(s) {
  if (!s.carry) return;
  const amt = s.carry.amt;
  G.money += amt;
  G.totalEarned += amt;
  G.stats = G.stats || {};
  spawnParticleAt(s.x + stageOffX, s.y + stageOffY, `+¥${amt}`, 'gold');
  addLog(`💰 ${STAFF_POOL.find(sp=>sp.id===s.staffId)?.name} が ¥${amt} を換金`);
  updateUI();
}

// ====================================================
//  YIELD GROWTH
// ====================================================
function updateYields() {
  G.placed.forEach(p => {
    const bld = BUILDINGS[p.bldId];

    // Build progress
    if (!p.active && bld.buildTime > 0) {
      p.progress += 100 / (bld.buildTime * (60000 / TICK_MS));
      if (p.progress >= 100) {
        p.progress = 100;
        p.active = true;
        addLog(`✅ ${bld.name} が完成した！`);
        showBanner(`✅ ${bld.name} が完成した！`);
      }
      if (p.progressEl) p.progressEl.style.width = p.progress + '%';
      return;
    }

    if (!bld.yieldTime || p.hasYield) return;

    // Growth speed with bonuses
    let speed = 100 / (bld.yieldTime * (1000 / TICK_MS));
    const adj = getAdjacentPlaced(p.col, p.row);
    adj.forEach(a => {
      if (a.bldId === 'water_channel' && a.active) speed *= 1.2;
      if (a.bldId === 'greenhouse' && a.active) speed *= 1.15;
    });
    if (RESEARCH_TREE.find(r=>r.id==='agri1'&&r.done)) speed *= 1.1;
    if (G.weather === 'rain') speed *= 1.3;
    if (G.weather === 'storm') speed *= 0.6;

    p.yieldProg += speed;
    if (p.progressEl) p.progressEl.style.width = Math.min(100,p.yieldProg) + '%';
    if (p.progressEl) p.progressEl.style.background = 'linear-gradient(90deg,var(--gold),#f5e6c8)';

    if (p.yieldProg >= 100) {
      p.hasYield = true;
      p.yieldProg = 0;
      if (p.progressEl) p.progressEl.style.background = 'linear-gradient(90deg,var(--green),var(--green-light))';
      if (p.progressEl) p.progressEl.style.width = '100%';
      showBanner(`🍄 ${bld.name} が収穫できる！`);
    }
  });
}

// ====================================================
//  DAY CYCLE
// ====================================================
function dayTick() {
  G.tick++;
  if (G.tick % (60000 / TICK_MS) === 0) {
    G.day++;
    if (G.day > 30) { G.day = 1; G.year++; }
    // RP gain
    let rp = G.rpPerDay;
    if (G.placed.some(p=>p.bldId==='lab'&&p.active)) rp += 5;
    if (G.placed.some(p=>p.bldId==='teahouse'&&p.active)) rp += 2;
    G.rp += rp;
    // Satisfaction
    if (G.placed.some(p=>p.bldId==='bench'&&p.active)) G.satisfaction = Math.min(100, G.satisfaction + 5);
    if (G.placed.some(p=>p.bldId==='teahouse'&&p.active)) G.satisfaction = Math.min(100, G.satisfaction + 10);
    // Weather change
    G.weatherTimer++;
    if (G.weatherTimer > 3 + Math.floor(Math.random()*4)) {
      G.weatherTimer = 0;
      const weathers = ['sunny','sunny','rain','fog','storm'];
      G.weather = weathers[Math.floor(Math.random()*weathers.length)];
      updateWeatherDisplay();
    }
    // Random event
    if (Math.random() < 0.08) triggerEvent();
    updateUI();
  }
}

function updateWeatherDisplay() {
  const map = {sunny:'☀️晴れ', rain:'🌧️雨', fog:'🌫️霧', storm:'⛈️嵐'};
  document.getElementById('hdr-date').textContent =
    `${G.year}年${G.day}日 ${map[G.weather]||''}`;
}

// ====================================================
//  RANDOM EVENTS
// ====================================================
const EVENTS = [
  { id:'fog_event', banner:'🌫️ 幻想郷の霧！ キノコが急成長中…', fn: ()=>{
    G.placed.filter(p=>BUILDINGS[p.bldId]?.yieldTime && p.active).forEach(p=>{
      p.yieldProg = Math.min(100, p.yieldProg + 30);
    });
    document.getElementById('event-overlay').className = 'fog';
    setTimeout(()=>document.getElementById('event-overlay').className='',8000);
  }},
  { id:'spark', banner:'💥 マスタースパーク発動！ 焼けキノコ大量発生！', fn: ()=>{
    G.money += 500;
    spawnParticleAt(window.innerWidth/2, window.innerHeight/2, '+¥500 焼きキノコ！', 'gold');
  }},
  { id:'visitor', banner:'👘 里からお客さんが来た！ 満足度UP！', fn: ()=>{
    G.satisfaction = Math.min(100, G.satisfaction + 15);
    G.money += G.placed.some(p=>p.bldId==='teahouse'&&p.active) ? 200 : 80;
  }},
  { id:'mutation', banner:'🧬 突然変異！ ランダムな棚の収益が一時的にUP！', fn: ()=>{
    const shelves = G.placed.filter(p=>BUILDINGS[p.bldId]?.yieldTime && p.active);
    if (shelves.length) {
      const s = shelves[Math.floor(Math.random()*shelves.length)];
      s.yieldProg = 100; s.hasYield = true;
    }
  }},
];

function triggerEvent() {
  if (!RESEARCH_TREE.find(r=>r.id==='magic1'&&r.done) && Math.random() < 0.5) return;
  const ev = EVENTS[Math.floor(Math.random()*EVENTS.length)];
  showBanner(ev.banner);
  ev.fn();
  addLog(`⚡ イベント: ${ev.banner}`);
}

// ====================================================
//  PARTICLES
// ====================================================
function spawnParticleAt(x, y, text, cls) {
  const el = document.createElement('div');
  el.className = `particle ${cls}`;
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = cls === 'gold' ? 'var(--gold)' : 'var(--green-light)';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ====================================================
//  UI: HEADER
// ====================================================
function updateUI() {
  document.getElementById('hdr-money').textContent = '¥' + G.money.toLocaleString();
  document.getElementById('hdr-date').textContent =
    `${G.year}年${G.day}日`;
}

// ====================================================
//  UI: TAB / PANEL
// ====================================================
function toggleTab(tab) {
  const panel = document.getElementById('slide-panel');
  const inner = document.getElementById('slide-panel-inner');

  document.querySelectorAll('.menu-icon-btn').forEach(b => b.classList.remove('active'));

  if (G.activeTab === tab) {
    G.activeTab = null;
    panel.classList.remove('open');
    closeDetailPanel();
    return;
  }
  G.activeTab = tab;
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  panel.classList.add('open');

  if (tab === 'build') renderBuildPanel(inner);
  else if (tab === 'research') renderResearchPanel(inner);
  else if (tab === 'staff') renderStaffPanel(inner);
  else if (tab === 'log') renderLogPanel(inner);
}

function renderBuildPanel(inner) {
  let html = '';
  for (const [catId, cat] of Object.entries(CATEGORIES)) {
    html += `<div class="panel-section-title">${cat.label}</div>`;
    cat.items.forEach(bldId => {
      const bld = BUILDINGS[bldId];
      const locked = bld.unlockResearch && !RESEARCH_TREE.find(r=>r.id===bld.unlockResearch&&r.done);
      html += `<div class="panel-item ${G.selectedBldId===bldId?'selected':''} ${locked?'locked':''}"
        onclick="selectBld('${bldId}')">
        <span class="item-icon">${bld.icon}</span>
        <div class="item-info">
          <div class="item-name">${bld.name}${locked?' 🔒':''}</div>
          <div class="item-cost">¥${bld.cost}</div>
        </div>
      </div>`;
    });
  }
  inner.innerHTML = html;
}

function selectBld(bldId) {
  G.selectedBldId = bldId;
  G.activeTool = null;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  renderBuildPanel(document.getElementById('slide-panel-inner'));
  showDetailPanel(bldId);
}

function showDetailPanel(bldId) {
  const bld = BUILDINGS[bldId];
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  const combosStr = bld.combos.map(c => {
    const b = BUILDINGS[c];
    return b ? `<span class="dp-tag combo">⚡ ${b.icon}${b.name}</span>` : '';
  }).join('');

  content.innerHTML = `
    <div class="dp-row">
      <span class="dp-icon">${bld.icon}</span>
      <div class="dp-info">
        <div class="dp-name">${bld.name}</div>
        <div class="dp-cost">建設コスト: ¥${bld.cost}　建設時間: ${bld.buildTime}秒</div>
      </div>
    </div>
    <div class="dp-flavor">"${bld.flavor}"</div>
    <div class="dp-effects">
      ${bld.effects.map(e=>`<span class="dp-tag">✅ ${e}</span>`).join('')}
    </div>
    ${combosStr ? `<div style="margin-bottom:8px"><div style="font-size:9px;color:#8a7060;margin-bottom:3px">◆ 相性(コンボ)</div>${combosStr}</div>` : ''}
    <button id="dp-build-btn" onclick="startPlaceMode()">
      🏗️ タイルを選んで建設
    </button>
    <button id="dp-cancel-btn" onclick="closeDetailPanel()">キャンセル</button>
  `;
  panel.classList.add('open');
  document.getElementById('bottom-bar').classList.add('hidden');
}

function closeDetailPanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('bottom-bar').classList.remove('hidden');
  G.selectedBldId = null;
  if (G.activeTab === 'build') {
    renderBuildPanel(document.getElementById('slide-panel-inner'));
  }
}

function startPlaceMode() {
  closeDetailPanel();
  showBanner(`📍 ${BUILDINGS[G.selectedBldId]?.name} を置く場所をタップ！`);
}

// ====================================================
//  UI: RESEARCH
// ====================================================
function renderResearchPanel(inner) {
  let html = `<div class="panel-section-title">研究ポイント: ${Math.floor(G.rp)} RP</div>`;
  RESEARCH_TREE.forEach(r => {
    const pct = Math.min(100, (r.progress / r.rp) * 100);
    html += `<div class="research-card">
      <div class="rc-header">
        <span class="rc-name">${r.done?'✅':''} ${r.name}</span>
        <span class="rc-status">${r.done?'完了':Math.floor(pct)+'%'}</span>
      </div>
      <div class="rc-desc">${r.effect}</div>
      <div class="rc-bar"><div class="rc-bar-fill" style="width:${pct}%"></div></div>
      ${!r.done ? `<button class="rc-btn" onclick="investRP('${r.id}')" ${G.rp < 30 ? 'disabled':''}>
        RP 30 投入 (残り ${Math.ceil((r.rp - r.progress)/30)} 回)
      </button>` : ''}
    </div>`;
  });
  inner.innerHTML = html;
}

function investRP(id) {
  const r = RESEARCH_TREE.find(r=>r.id===id);
  if (!r || r.done || G.rp < 30) return;
  G.rp -= 30;
  r.progress += 30;
  if (r.progress >= r.rp) {
    r.done = true;
    r.progress = r.rp;
    showBanner(`✅ 研究完了: ${r.name}！`);
    addLog(`🔬 研究完了: ${r.name}`);
    // Rebuild panel for unlocks
    renderBuildPanel(document.getElementById('slide-panel-inner'));
  }
  renderResearchPanel(document.getElementById('slide-panel-inner'));
  updateUI();
}

// ====================================================
//  UI: STAFF
// ====================================================
function renderStaffPanel(inner) {
  let html = `<div class="panel-section-title">人員管理</div>`;
  STAFF_POOL.forEach(sp => {
    const active = G.staff.find(s=>s.staffId===sp.id);
    html += `<div class="staff-card">
      <span class="sc-avatar">${sp.icon}</span>
      <div class="sc-info">
        <div class="sc-name">${sp.name}</div>
        <div class="sc-role">${sp.role}</div>
        <div class="sc-stats">
          <span class="sc-stat">速度${sp.speed}</span>
          <span class="sc-stat">運搬${sp.carry}</span>
          <span class="sc-stat">魔法${sp.magic}</span>
        </div>
        ${active ? `<div style="font-size:8px;color:#8a7060;margin-top:2px">疲労: ${Math.floor(active.fatigue)}% | ${active.state}</div>` : ''}
      </div>
      ${sp.salary > 0 ?
        `<button class="hire-btn" onclick="hireStaff('${sp.id}')" ${active?'disabled':''}>
          ${active ? '雇用中' : `¥${sp.salary}/日`}
        </button>` :
        `<span style="font-size:9px;color:var(--gold)">オーナー</span>`
      }
    </div>`;
  });
  inner.innerHTML = html;
}

function hireStaff(id) {
  const sp = STAFF_POOL.find(sp=>sp.id===id);
  if (!sp || G.money < sp.salary) { showBanner('💰 資金不足！'); return; }
  G.money -= sp.salary;
  sp.hired = true;
  const ns = { staffId:id, x:50+Math.random()*50, y:50+Math.random()*30, state:'idle', target:null, carry:null, fatigue:0, el:null, statusEl:null };
  G.staff.push(ns);
  spawnCharEl(ns);
  addLog(`👤 ${sp.name} を雇用した`);
  showBanner(`👤 ${sp.name} がチームに加わった！`);
  renderStaffPanel(document.getElementById('slide-panel-inner'));
  updateUI();
}

// ====================================================
//  UI: LOG
// ====================================================
function addLog(msg) {
  G.eventLog.unshift({ msg, day:`${G.year}年${G.day}日` });
  if (G.eventLog.length > 30) G.eventLog.pop();
}

function renderLogPanel(inner) {
  let html = `<div class="panel-section-title">経営ログ</div>`;
  if (!G.eventLog.length) { inner.innerHTML = html + '<div style="font-size:10px;color:#8a7060;padding:8px">まだログがない。</div>'; return; }
  G.eventLog.forEach(e => {
    html += `<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:10px">
      <span style="color:#8a7060;font-size:8px">${e.day}</span> ${e.msg}
    </div>`;
  });
  inner.innerHTML = html;
}

// ====================================================
//  TOOL BUTTONS
// ====================================================
function toggleTool(tool) {
  if (G.activeTool === tool) {
    G.activeTool = null;
    document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
    G.selectedBldId = null;
  } else {
    G.activeTool = tool;
    G.selectedBldId = null;
    closeDetailPanel();
    document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(`tool-${tool}`)?.classList.add('active');
    showBanner(tool === 'remove' ? '🗑️ 撤去するタイルをタップ' : '✋ 移動モード（未実装）');
  }
}

// ====================================================
//  MODAL
// ====================================================
function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ====================================================
//  BANNER
// ====================================================
function showBanner(text) {
  const el = document.getElementById('event-banner');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  el.addEventListener('animationend', () => el.classList.remove('show'), { once: true });
}

// ====================================================
//  DRAG-TO-PAN
// ====================================================
let panStart = null, panOriginX = 0, panOriginY = 0;
let panOffX = 0, panOffY = 0;

document.getElementById('iso-scroll').addEventListener('pointerdown', (e) => {
  if (e.target.closest('.iso-tile') || e.target.closest('.bld-sprite') || e.target.closest('.character')) return;
  panStart = { x: e.clientX, y: e.clientY };
  panOriginX = panOffX;
  panOriginY = panOffY;
}, { passive: true });

document.addEventListener('pointermove', (e) => {
  if (!panStart) return;
  const dx = e.clientX - panStart.x;
  const dy = e.clientY - panStart.y;
  if (Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
  panOffX = panOriginX + dx;
  panOffY = panOriginY + dy;
  document.getElementById('iso-stage').style.transform =
    `translate(${stageOffX + panOffX}px, ${stageOffY + panOffY}px)`;
});

document.addEventListener('pointerup', () => { panStart = null; });

// ====================================================
//  MAIN LOOP
// ====================================================
function gameLoop() {
  updateYields();
  updateCharacters();
  dayTick();
}

// ====================================================
//  INIT
// ====================================================
function init() {
  initStage();
  buildGrid();
  initCharacters();

  // Place starter buildings
  setTimeout(() => {
    placeBuild('collection_box', 4, 4);
    placeBuild('shelf_nameko', 3, 4);
    placeBuild('path', 4, 3);
    placeBuild('water_channel', 2, 4);
    updateCombos();

    addLog('🌿 霧雨魔法キノコ園 開業！');
    showBanner('🍄 霧雨魔法キノコ園へようこそ！左のメニューから建設を始めよう！');
  }, 300);

  setInterval(gameLoop, TICK_MS);
  updateUI();
}

window.addEventListener('resize', () => { initStage(); });
window.addEventListener('load', init);
</script>
